<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Stars JP - 地域の優良認定企業カタログ</title>
    <meta name="description" content="gBizINFOのオープンデータを活用し、都道府県別のホワイト企業認定（ユースエール、えるぼし、健康経営等）を可視化します。">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="container">
            <h1>🌟 Local Stars JP</h1>
            <p>地域の優良認定企業を見つけよう</p>
        </div>
    </header>

    <main class="container">
        <section id="pref-selector-panel">
            <!-- タブナビゲーション -->
            <div class="tab-nav" role="tablist" aria-label="都道府県の選択方法">
                <button class="tab-btn active" id="tab-btn-map" role="tab"
                        aria-controls="tab-panel-map" aria-selected="true" type="button">
                    🗾 地図から選ぶ
                </button>
                <button class="tab-btn" id="tab-btn-list" role="tab"
                        aria-controls="tab-panel-list" aria-selected="false" type="button">
                    📋 一覧から選ぶ
                </button>
            </div>

            <!-- タブパネル: ビジュアル地図 -->
            <div id="tab-panel-map" role="tabpanel" aria-labelledby="tab-btn-map">
                <!-- Step1: 地方選択SVG地図 -->
                <div id="region-view">
                    <p class="map-hint">地方をクリックして絞り込み</p>
                    <svg id="region-svg" viewBox="0 0 360 555" xmlns="http://www.w3.org/2000/svg" aria-label="日本地方区分図" role="img">
                        <!-- 北海道地方 -->
                        <g class="region-btn" data-idx="0" role="button" tabindex="0" aria-label="北海道">
                            <rect x="195" y="8" width="155" height="78" rx="10" fill="#a8d8ea"/>
                            <text x="272" y="44" text-anchor="middle" dominant-baseline="middle" font-size="15" font-weight="bold" fill="#1a252f">北海道</text>
                            <text x="272" y="64" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#1a252f">1道</text>
                        </g>
                        <!-- 東北地方 -->
                        <g class="region-btn" data-idx="1" role="button" tabindex="0" aria-label="東北">
                            <rect x="200" y="96" width="110" height="128" rx="10" fill="#c5b3e6"/>
                            <text x="255" y="155" text-anchor="middle" dominant-baseline="middle" font-size="15" font-weight="bold" fill="#1a252f">東北</text>
                            <text x="255" y="175" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#1a252f">6県</text>
                        </g>
                        <!-- 関東地方 -->
                        <g class="region-btn" data-idx="2" role="button" tabindex="0" aria-label="関東">
                            <rect x="230" y="228" width="118" height="78" rx="10" fill="#fcbad3"/>
                            <text x="289" y="263" text-anchor="middle" dominant-baseline="middle" font-size="15" font-weight="bold" fill="#1a252f">関東</text>
                            <text x="289" y="283" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#1a252f">7都県</text>
                        </g>
                        <!-- 中部地方 -->
                        <g class="region-btn" data-idx="3" role="button" tabindex="0" aria-label="中部">
                            <rect x="130" y="228" width="95" height="112" rx="10" fill="#fff3a3"/>
                            <text x="177" y="279" text-anchor="middle" dominant-baseline="middle" font-size="15" font-weight="bold" fill="#1a252f">中部</text>
                            <text x="177" y="299" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#1a252f">9県</text>
                        </g>
                        <!-- 近畿地方 -->
                        <g class="region-btn" data-idx="4" role="button" tabindex="0" aria-label="近畿">
                            <rect x="98" y="340" width="88" height="78" rx="10" fill="#a8e6cf"/>
                            <text x="142" y="375" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="bold" fill="#1a252f">近畿</text>
                            <text x="142" y="395" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#1a252f">7府県</text>
                        </g>
                        <!-- 中国地方 -->
                        <g class="region-btn" data-idx="5" role="button" tabindex="0" aria-label="中国">
                            <rect x="18" y="340" width="78" height="78" rx="10" fill="#ffd3b6"/>
                            <text x="57" y="375" text-anchor="middle" dominant-baseline="middle" font-size="13" font-weight="bold" fill="#1a252f">中国</text>
                            <text x="57" y="395" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#1a252f">5県</text>
                        </g>
                        <!-- 四国地方 -->
                        <g class="region-btn" data-idx="6" role="button" tabindex="0" aria-label="四国">
                            <rect x="100" y="426" width="88" height="72" rx="10" fill="#dcedc1"/>
                            <text x="144" y="459" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="bold" fill="#1a252f">四国</text>
                            <text x="144" y="479" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#1a252f">4県</text>
                        </g>
                        <!-- 九州・沖縄地方 -->
                        <g class="region-btn" data-idx="7" role="button" tabindex="0" aria-label="九州・沖縄">
                            <rect x="15" y="426" width="83" height="100" rx="10" fill="#ffaaa5"/>
                            <rect x="15" y="533" width="60" height="22" rx="6" fill="#ffaaa5"/>
                            <text x="56" y="471" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="bold" fill="#1a252f">九州・</text>
                            <text x="56" y="489" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="bold" fill="#1a252f">沖縄</text>
                            <text x="45" y="544" text-anchor="middle" dominant-baseline="middle" font-size="10" fill="#1a252f">8県</text>
                        </g>
                    </svg>
                </div>
                <!-- Step2: 都道府県グリッド選択 -->
                <div id="pref-grid-view" hidden>
                    <div class="pref-view-header">
                        <button id="back-to-regions" type="button">← 地方一覧</button>
                        <strong id="selected-region-name"></strong>
                    </div>
                    <div id="pref-grid"></div>
                </div>
            </div>

            <!-- タブパネル: ドロップダウン一覧 -->
            <div id="tab-panel-list" role="tabpanel" aria-labelledby="tab-btn-list" hidden>
                <div class="field">
                    <label for="pref-selector">都道府県を選択：</label>
                    <select id="pref-selector">
                        <option value="">-- 選択してください --</option>
                    </select>
                </div>
            </div>
        </section>

        <div id="map" hidden></div>

        <div id="name-filter-wrap" hidden>
            <div class="name-filter-field">
                <label for="name-filter">企業名で絞り込み：</label>
                <input type="search" id="name-filter" placeholder="企業名を入力..." autocomplete="off">
            </div>
            <div class="name-filter-field">
                <label for="cert-filter">認定名称で絞り込み：</label>
                <select id="cert-filter">
                    <option value="">すべて</option>
                </select>
            </div>
        </div>

        <section id="list-container">
            <p class="placeholder">都道府県を選択すると、認定企業の一覧が表示されます。</p>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>出典：経済産業省 <a href="https://info.gbiz.go.jp/" target="_blank" rel="noopener">gBizINFO</a></p>
            <p>© 2026 local-stars-jp Project</p>
        </div>
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script type="module" src="app.js"></script>
</body>
</html>
