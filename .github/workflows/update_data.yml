name: Daily Update

on:
  schedule:
    - cron: '0 15 * * *' # 日本時間 0:00
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Fetch Data
        env:
          GBIZ_API_KEY: ${{ secrets.GBIZ_API_KEY }}
        run: bun src/scraper/fetch_data.ts

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update enterprise data"